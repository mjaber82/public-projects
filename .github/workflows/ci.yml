name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: app.settings.dev
      SECRET_KEY: ci-secret
      ALLOWED_HOSTS: localhost
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      STRIPE_SECRET_KEY: test
      STRIPE_WEBHOOK_SECRET: test
      FIREBASE_PROJECT_ID: test
      FIREBASE_SERVICE_ACCOUNT_JSON: /tmp/fake-service-account.json
      DEFAULT_FROM_EMAIL: no-reply@example.com
      EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create fake Firebase file
        run: |
          openssl genrsa -out /tmp/fake-firebase-key.pem 2048
          python - <<'PY'
          import json

          with open('/tmp/fake-firebase-key.pem', 'r', encoding='utf-8') as f:
              private_key = f.read()

          payload = {
              "type": "service_account",
              "project_id": "test",
              "private_key_id": "ci-private-key-id",
              "private_key": private_key,
              "client_email": "ci-firebase@test.iam.gserviceaccount.com",
              "client_id": "000000000000000000000",
              "auth_uri": "https://accounts.google.com/o/oauth2/auth",
              "token_uri": "https://oauth2.googleapis.com/token",
              "auth_provider_x509_cert_url": "https://www.googleapis.com/oauth2/v1/certs",
              "client_x509_cert_url": "https://www.googleapis.com/robot/v1/metadata/x509/ci-firebase%40test.iam.gserviceaccount.com",
          }

          with open('/tmp/fake-service-account.json', 'w', encoding='utf-8') as f:
              json.dump(payload, f)
          PY

      - name: Django system checks
        run: python manage.py check

      - name: Ensure migrations are current
        run: python manage.py makemigrations --check

      - name: Run tests
        run: pytest app/ -v --cov=app/ --cov-report=term

      - name: Build Docker image
        run: docker build . --tag digital-wallet-ci
