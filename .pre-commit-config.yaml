exclude: '^docs/|/migrations/|/app/users/email-templates/'
default_stages: [pre-commit, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: 'app/users/email-templates/'
      - id: end-of-file-fixer
      - id: check-json
      - id: check-toml
      - id: check-xml
      - id: check-yaml
      - id: debug-statements
      - id: check-builtin-literals
      - id: check-case-conflict
      - id: check-docstring-first
      - id: detect-private-key

  - repo: https://github.com/jorisroovers/gitlint
    rev: v0.19.1 # ensure using the latest version
    hooks:
      - id: gitlint
        name: GitLint
        stages: [commit-msg]

  - repo: local
    hooks:
      - id: branch-name
        name: Check Branch Name
        entry: bash scripts/check_branch_name.sh
        language: system
        stages: [pre-commit]

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        args: ['--tab-width', '2', '--single-quote']
        exclude: 'app/users/email-templates/'

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.12.0
    hooks:
      # Run the linter.
      - id: ruff-check
        args: [--fix]
      # Run the formatter.
      - id: ruff-format
  - repo: local
    hooks:
      - id: pip-audit
        name: pip-audit
        entry: bash -c 'pip-audit -r requirements.txt'
        language: system
        files: ^requirements\.txt$
        pass_filenames: false
        stages: [pre-commit]

ci:
  autoupdate_schedule: weekly
  skip: []
  submodules: false
